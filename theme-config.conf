# Hang Underwears Theme Configuration
# Cấu hình theme Hang Underwears

# Theme colors / Màu sắc theme
PRIMARY_COLOR="#667eea"
SECONDARY_COLOR="#764ba2"
BACKGROUND_COLOR="#f8f9fa"
TEXT_COLOR="#212529"

# Installation preferences / Tùy chọn cài đặt
AUTO_BACKUP_CURRENT_THEME=true
CREATE_DESKTOP_SHORTCUT=true
INSTALL_ICON_THEME=true

# Directories / Thư mục
THEME_DIR="$HOME/.themes"
ICON_DIR="$HOME/.icons"
BACKUP_DIR="$HOME/.config/hang-underwears-theme-backup"

# Advanced settings / Cài đặt nâng cao
ENABLE_ANIMATIONS=true
ENABLE_TRANSPARENCY=true
BUTTON_RADIUS="6px"
WINDOW_RADIUS="8px"